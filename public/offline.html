<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline — DokMaker</title>
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
           font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #09090b; color: #e4e4e7; padding: 1.5rem; }
    .card { max-width: 28rem; text-align: center; }
    h1 { font-size: 1.5rem; margin: 0 0 0.75rem; color: #a5b4fc; }
    p { font-size: 0.875rem; line-height: 1.5; color: #a1a1aa; margin: 0.5rem 0; }
    .warning { margin-top: 1.5rem; padding: 0.75rem; border-radius: 0.75rem;
               background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.2);
               font-size: 0.75rem; color: #fcd34d; }
    button { margin-top: 1.5rem; padding: 0.625rem 1.25rem; border-radius: 0.75rem;
             background: #4f46e5; color: white; border: none; font-weight: 600;
             font-size: 0.875rem; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Anda sedang offline</h1>
    <p>DokMaker membutuhkan koneksi internet untuk membuat invoice, top up saldo, dan download PDF final.</p>
    <div class="warning">
      Tindakan finansial (pembayaran, potong saldo, download final) selalu membutuhkan koneksi online untuk keamanan transaksi Anda.
    </div>
    <button onclick="location.reload()">Coba lagi</button>
  </div>
</body>
</html>
